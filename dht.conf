# dht.conf — configuration for dht_server
# Lines starting with # are comments. Format: key = value

# Serial port. Leave blank to auto-detect (scans /dev/serial/by-id then ttyACM/ttyUSB).
serial_port =

# HTTP listen port for the dashboard + API.
http_port = 8080

# HTML source
hsrc=dashboard.html

# CSV log file (source of truth, append-only). Columns: epoch_ms,humidity,temperature,status
log_file = /opt/dht-dashboard/readings.csv

# How much recent history to hold in memory and render on the charts.
# Accepts s, m, h, d suffixes (seconds/minutes/hours/days). Disk keeps everything regardless.
chart_window = 6h

# Humidity threshold bands (%RH). Three thresholds each side give four bands.
# Ordering must be: crit_low <= warning_low <= optimal_low <= optimal_high <= warning_high <= crit_high
#   below crit_low      OR above crit_high      -> critical
#   in [crit_low, warning_low) or (warning_high, crit_high] -> warning
#   in [warning_low, optimal_low) or (optimal_high, warning_high] -> normal
#   in [optimal_low, optimal_high]              -> optimal (ideal)
hum_crit_low     = 30
hum_warning_low  = 40
hum_optimal_low  = 45
hum_optimal_high = 55
hum_warning_high = 60
hum_crit_high    = 70

# Temperature threshold bands (degrees C). Same four-band scheme as humidity:
#   below crit_low      OR above crit_high       -> critical
#   in [crit_low, warning_low) or (warning_high, crit_high] -> warning
#   in [warning_low, optimal_low) or (optimal_high, warning_high] -> normal
#   in [optimal_low, optimal_high]               -> optimal (ideal)
temp_crit_low     = 16
temp_warning_low  = 18
temp_optimal_low  = 20
temp_optimal_high = 24
temp_warning_high = 34
temp_crit_high    = 35
